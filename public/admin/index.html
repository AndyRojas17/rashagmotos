<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rashag Motos — Admin</title>
</head>
<body>
  <script>
    (function() {
      const hash = window.location.hash;
      const match = hash.match(/github-token=([^&]+)/);

      if (match) {
        // POPUP: recibimos token en el hash, lo enviamos a la ventana principal via BroadcastChannel
        const token = decodeURIComponent(match[1]);
        document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:40px">✅ Autenticando...</p>';

        const bc = new BroadcastChannel('decap-auth');
        bc.postMessage({ token: token, provider: 'github' });
        bc.close();

        setTimeout(() => window.close(), 1500);
        return; // No cargar Decap CMS en el popup
      }

      // VENTANA PRINCIPAL: escucha el token del popup via BroadcastChannel
      const bc = new BroadcastChannel('decap-auth');
      bc.onmessage = function(e) {
        if (e.data && e.data.token) {
          bc.close();
          // Crear iframe desde el worker origin para que Decap CMS acepte el postMessage
          const iframe = document.createElement('iframe');
          iframe.style.cssText = 'display:none;position:absolute;width:0;height:0';
          iframe.src = 'https://rashagmotos-oauth.dugo817.workers.dev/forward?token=' + encodeURIComponent(e.data.token);
          document.body.appendChild(iframe);
        }
      };

      // Cargar Decap CMS
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
